name: Build & Release Installers

env:
  APP_NAME: GateTIK
  VERSION: 1.0.1

on:
  push:
    branches:
      - main

jobs:
  # Windows & Linux Installers
  build:
    name: Build ${{ matrix.installer }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            installer: msi
            task: packageReleaseMsi
            artifact_name: installer-msi
            artifact_path: "**/build/compose/binaries/main-release/msi/*.msi"
            os_name: windows
            arch: amd64

          - os: ubuntu-latest
            installer: deb
            task: packageReleaseDeb
            artifact_name: installer-deb
            artifact_path: "**/build/compose/binaries/main-release/deb/*.deb"
            os_name: linux
            arch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Write local.properties
        shell: bash
        run: | 
          echo "BACKEND_URL=${{ secrets.BACKEND_URL }}" >> local.properties
          echo "RTSP_CCTV_URL=${{ secrets.RTSP_CCTV_URL }}" >> local.properties
          echo "WEB_RTC_PLAYER_CCTV_URL=${{ secrets.WEB_RTC_PLAYER_CCTV_URL }}" >> local.properties
          echo "ANDROID_INSTALLATION_URL=${{ secrets.ANDROID_INSTALLATION_URL }}" >> local.properties
          echo "VERSION=${{ env.VERSION }}" >> local.properties

      - name: Generate BuildConfig
        run: ./gradlew generateBuildConfig
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Package ${{ matrix.installer }}
        run: ./gradlew ${{ matrix.task }}
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Rename installer
        shell: bash
        run: |
          FILE=$(find . -path "${{ matrix.artifact_path }}" | head -n 1)
          DIR=$(dirname "$FILE")
          mv "$FILE" "$DIR/${{ env.APP_NAME }}-${{ env.VERSION }}_${{ matrix.os_name }}_${{ matrix.arch }}.${{ matrix.installer }}"

      - name: Upload ${{ matrix.installer }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  # GitHub Release
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: List downloaded files
        run: ls -lh installers/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: |
            Automated release from commit ${{ github.sha }}

            **Changes in this release:**
            ${{ github.event.head_commit.message }}
          files: installers/**/*
          fail_on_unmatched_files: true